spring:
  application:
    name: EasyDoc

  datasource:
    url: "jdbc:mysql://localhost:3306/easy-doc?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true"
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      jdbc:
        time_zone: UTC
  thymeleaf:
    cache: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp.mail.yahoo.com
    port: 587
    username: "yani_stoyanov@yahoo.com"
    password: "vrhbfcifyhokdwux"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  app:
    mail:
      from: "yani_stoyanov@yahoo.com"

server:
  port: 8080
