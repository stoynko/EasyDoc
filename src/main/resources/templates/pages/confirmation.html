<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:replace="~{pages/main_layout :: layout(~{::title},
                                    ~{::body[@data-fragment='body']},
                                    ~{::th:block[@data-fragment='head']},
                                    ~{::th:block[@data-fragment='scripts']}
      )}">

<head>
    <meta charset="UTF-8">
    <title data-fragment="title">EasyDoc</title>
    <th:block data-fragment="head">

    </th:block>
</head>

<body data-fragment="body">

<!-- HEADER-->
<header sec:authorize="isAnonymous()" th:insert="~{fragments/components/header :: header}"></header>
<header sec:authorize="isAuthenticated()" th:insert="~{fragments/components/header :: header_auth}"></header>

<div class="workspace-container">

    <!-- SIDEBAR NAVIGATION -->
    <th:block sec:authorize="isAuthenticated() and !hasAuthority('STATUS_INCOMPLETE')">">
        <aside th:if="${#strings.contains(currentPath ?: '', '/settings')}"
               th:insert="~{fragments/components/sidebar_navigation :: settings_navigation}"
               class="sidebar">
        </aside>

        <aside th:if="${!#strings.contains(currentPath ?: '', '/settings')}"
               th:insert="~{fragments/components/sidebar_navigation :: workspace_navigation}"
               class="sidebar">
        </aside>
    </th:block>


        <!-- FRAGMENT DISPLAY -->
        <div class="main-content">
            <th:block th:switch="${confirmationMessage}">

                <th:block th:case="registrationSuccess">
                    <th:block th:insert="~{fragments/success :: registration-success}"></th:block>
                </th:block>

                <th:block th:case="personalInfoUpdateSuccess">
                    <th:block th:insert="~{fragments/success :: personal-info-update-success}"></th:block>
                </th:block>

                <th:block th:case="profilePhotoUpdateSuccess">
                    <th:block th:insert="~{fragments/success :: profile-photo-update-success}"></th:block>
                </th:block>

                <th:block th:case="contactInfoUpdateSuccess">
                    <th:block th:insert="~{fragments/success :: contact-info-update-success}"></th:block>
                </th:block>

                <th:block th:case="professionalInfoUpdateSuccess">
                    <th:block th:insert="~{fragments/success :: professional-info-update-success}"></th:block>
                </th:block>

                <th:block th:case="emailAddressUpdateSuccess">
                    <th:block th:insert="~{fragments/success :: email-address-update-success}"></th:block>
                </th:block>

                <th:block th:case="passwordUpdateSuccess">
                    <th:block th:insert="~{fragments/success :: password-update-success}"></th:block>
                </th:block>

                <th:block th:case="deleteRequestSuccess">
                    <th:block th:insert="~{fragments/success :: account-deletion-success}"></th:block>
                </th:block>

                <th:block th:case="appointmentCancellationSuccess">
                    <th:block th:insert="~{fragments/success :: appointment-cancellation-success}"></th:block>
                </th:block>

            </th:block>
        </div>

</div>
</body>
</html>
