<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{main_layout :: layout(~{::title},
                                    ~{::body[@data-fragment='body']},
                                    ~{::th:block[@data-fragment='head']},
                                    ~{::th:block[@data-fragment='scripts']}
      )}">
<head>
    <meta charset="UTF-8">
    <title data-fragment="title">Medical Report</title>
    <th:block data-fragment="head">
        <!-- Using only styles declared in base.css -->
    </th:block>
</head>
<body data-fragment="body">

<header th:insert="~{fragments/components/header :: header_auth}"></header>

<div class="workspace-container">

    <!--SIDEBAR NAVIGATION -->
    <aside th:insert="~{fragments/components/sidebar_navigation :: workspace_navigation}" class="sidebar"></aside>

    <main class="main-content">

    <div class="dashboard-card">
        <div class="register-header">
            <h2>Medical Report Form</h2>
            <p class="text-muted">Document examination findings and follow-up recommendations.</p>
        </div>

        <form th:object="${medicalReportRequest}" th:action="@{/}" th:method="POST" class="add-form">

            <div class="form-group">
                <div class="form-actions right-align">
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-save"></i>
                        Save Report
                    </button>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="patient-id">Patient PIN</label>
                    <input th:value="${appointmentDetails.patientPin}" id="patient-id" type="text" name="id" readonly>
                </div>

                <div class="form-group">
                    <label for="patient-name">Patient's Name</label>
                    <input th:value="${appointmentDetails.patientFirstName + ' ' + appointmentDetails.patientLastName}" id="patient-name" type="text" name="id" readonly>
                </div>

                <div class="form-group">
                    <label for="appointment-publicId">Appointment Reference</label>
                    <input th:value="${appointmentDetails.appointmentId}" name="id" id="appointment-publicId" type="text" placeholder="Auto-generated" readonly>
                </div>
            </div>

            <div class="form-row">
                    <form th:object="${diagnosisSearchRequest}" th:action="@{/}" th:method="GET">
                        <div class="form-group">
                            <label for="anamnesis">Diagnosis</label>
                            <input th:field="*{keyword}" id="diagnosisKeyword" name="keyword" placeholder="Search by keyword"
                                   hx-get="@{/diagnosis/search}" hx-target="#diagnosis-selector" hx-swap="outerHTML"/>
                            <p th:if="${#fields.hasErrors('keyword')}" th:errors="*{keyword}" class="form-error">Placeholder Error</p>
                        </div>
                        <button type="submit" class="btn-primary">Search</button>
                    </form>

                    <div id="diagnosis-selector" class="form-group">
                        <label for="diagnosis">Accompanying Illnesses</label>
                        <select id="diagnosis" name="diagnosis">
                            <option value="">Select The Diagnosis</option>
                            <option>Placeholder</option>
                            <option>Placeholder</option>
                            <option>Placeholder</option>
                        </select>
                    </div>
                </div>

            <div class="form-group">
                    <label for="accompanying-illnesses">Accompanying Illnesses</label>
                    <textarea th:field="*{accompanyingIllnesses}" id="accompanying-illnesses" name="accompanyingIllnesses" placeholder="List any accompanying illnesses" rows="3"></textarea>
                    <p th:if="${#fields.hasErrors('accompanyingIllnesses')}" th:errors="*{accompanyingIllnesses}" class="form-error">Placeholder Error</p>
                </div>


            <div class="form-row">
                <div class="form-group">
                    <label for="anamnesis">Anamnesis</label>
                    <textarea th:field="*{anamnesis}" id="anamnesis" name="anamnesis" placeholder="Summarize patient history" rows="6"></textarea>
                    <p th:if="${#fields.hasErrors('anamnesis')}" th:errors="*{anamnesis}" class="form-error">Placeholder Error</p>
                </div>

                <div class="form-group">
                    <label for="status-at-exam">Status at Exam</label>
                    <textarea th:field="*{statusAtExam}" id="status-at-exam" name="statusAtExam" placeholder="Describe patient status at examination" rows="6"></textarea>
                    <p th:if="${#fields.hasErrors('statusAtExam')}" th:errors="*{statusAtExam}" class="form-error">Placeholder Error</p>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="diagnostic-procedures">Diagnostic Procedures</label>
                    <textarea th:field="*{diagnosticProcedures}" id="diagnostic-procedures" name="diagnosticProdecures" placeholder="Outline diagnostic procedures performed" rows="3"></textarea>
                    <p th:if="${#fields.hasErrors('diagnosticProcedures')}" th:errors="*{diagnosticProcedures}" class="form-error">Placeholder Error</p>
                </div>

                <div class="form-group">
                    <label for="recommendations">Recommendations</label>
                    <textarea th:field="*{recommendations}" id="recommendations" name="recommendations" placeholder="Add recommended follow-up actions"rows="3" ></textarea>
                    <p th:if="${#fields.hasErrors('recommendations')}" th:errors="*{recommendations}" class="form-error">Placeholder Error</p>
                </div>
            </div>
        </form>
    </div>
    </main>

</div>

</body>
</html>
