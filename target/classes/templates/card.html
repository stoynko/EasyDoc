<div class="application-card-content">

    <!--&lt;!&ndash; Profile Photo Section &ndash;&gt;
    <div class="application-photo-section">
        <div class="user-avatar">
            <img th:src="${pApplication.profilePhotoUrl}" alt="Profile Photo">
        </div>
    </div>-->

    <!-- DUPLICATE DELEte -->
    <div  class="application-section">

        <h3 class="application-section-title">Professional Information</h3>

        <div class="application-fields">

            <div class="application-field">
                <label class="application-field-label">UIN</label>
                <div th:text="${pApplication.doctorUin}"
                     class="application-field-value">Placeholder UIN
                </div>
            </div>

            <div class="application-field">
                <label class="application-field-label">Expertise</label>
                <div th:text="${pApplication.doctorExpertise.getDisplayValue()}"
                     class="application-field-value">Placeholder Expertise</div>
            </div>

            <div class="application-field">
                <label class="application-field-label">Years of Experience</label>
                <div th:text="${pApplication.doctorYearsExperience}"
                     class="application-field-value">Placeholder Experience</div>
            </div>

            <div class="application-field">
                <label class="application-field-label">Practice Location</label>
                <div th:text="${pApplication.doctorPracticeLocation}"
                     class="application-field-value">Placeholder Location</div>
            </div>
        </div>
    </div>

    <!-- Professional Information -->
    <div  class="application-section">

        <h3 class="application-section-title">Professional Information</h3>

        <div class="application-fields">

            <div class="application-field">
                <label class="application-field-label">UIN</label>
                <div th:text="${pApplication.doctorUin}"
                     class="application-field-value">Placeholder UIN
                </div>
            </div>

            <div class="application-field">
                <label class="application-field-label">Expertise</label>
                <div th:text="${pApplication.doctorExpertise.getDisplayValue()}"
                     class="application-field-value">Placeholder Expertise</div>
            </div>

            <div class="application-field">
                <label class="application-field-label">Years of Experience</label>
                <div th:text="${pApplication.doctorYearsExperience}"
                     class="application-field-value">Placeholder Experience</div>
            </div>

            <div class="application-field">
                <label class="application-field-label">Practice Location</label>
                <div th:text="${pApplication.doctorPracticeLocation}"
                     class="application-field-value">Placeholder Location</div>
            </div>
        </div>
    </div>

    <!-- Additional Information -->
    <div class="application-section">
        <h3 class="application-section-title">Additional Information</h3>
        <div class="application-fields">
            <div class="application-field application-field-full">
                <label class="application-field-label">Professional Highlights</label>
                <textarea readonly
                          th:text="${pApplication.doctorProfessionalHighlights}"
                          class="application-field-value application-textarea">Placeholder Highlights</textarea>
            </div>
            <div class="application-field application-field-full">
                <label class="application-field-label">Spoken Languages</label>
                <div th:unless="${#strings.trim(pApplication.doctorSpokenLanguages).isEmpty()}"
                     th:text="${pApplication.doctorSpokenLanguages}"
                     class="application-field-value">Placeholder Languages</div>
                <div th:if="${#strings.trim(pApplication.doctorSpokenLanguages).isEmpty()}"
                     class="application-field-value">-</div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="application-actions">

            <form th:action="@{/applications/{id}/approve(id=${pApplication.applicationId})}"
                  th:method="POST"
                  style="flex: 1; width: 100%;">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <button type="submit"
                        class="btn-primary"
                        style="width: 100%; text-align: center; text-decoration: none;">
                    <i class="fas fa-check"></i>
                    Approve
                </button>
            </form>

            <form th:action="@{/applications/{id}/reject(id=${pApplication.applicationId})}"
                  th:method="POST"
                  style="flex: 1; width: 100%;">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <button type="submit"
                        class="btn-primary warning"
                        style="width: 100%; text-align: center; text-decoration: none;">
                    <i class="fas fa-times"></i>
                    Reject
                </button>
            </form>

        </div>
    </div>
</div>
