<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:replace="~{main_layout :: layout(~{::title},
                                    ~{::body[@data-fragment='body']},
                                    ~{::th:block[@data-fragment='head']},
                                    ~{::th:block[@data-fragment='scripts']}
      )}">
<head>
    <meta charset="UTF-8">
    <title data-fragment="title">Users Management</title>
    <th:block data-fragment="head"></th:block>
</head>
<body data-fragment="body">

<!-- HEADER-->
<header th:insert="~{fragments/components/header :: header_auth}"></header>

<div class="workspace-container">

    <!-- SIDEBAR -->
    <aside th:insert="~{fragments/components/sidebar_navigation :: workspace_navigation}" class="sidebar"></aside>

    <div class="main-content">

        <div class="dashboard-card">

            <div class="entity-form">

                <!-- BREADCRUMB -->
                <span class="breadcrumb">
                   <a th:href="@{/appointments}" class="breadcrumb-link">Appointments </a>
                   <i class="fas fa-caret-right"></i>
                   <span th:text="${' ' + appointmentDetails.appointmentPublicId}">Placeholder Crumb</span>
               </span>

                <!-- PATIENT DETAILS -->
                <div class="view-card">

                    <h3 class="view-card-title" style="text-align: center">Patient's Details</h3>

                    <div class="entity-card-content">

                        <div class="entity-section">

                            <div class="entity-fields fields-inline">

                                <div class="entity-field field-inline">
                                    <label class="entity-field-label">Patient PIN</label>
                                    <div th:text="${appointmentDetails.patientPin}" class="entity-field-value"></div>
                                </div>

                                <div class="entity-field field-inline">
                                    <label class="entity-field-label">Patient's Name</label>
                                    <div th:text="${appointmentDetails.patientFirstName + ' ' + appointmentDetails.patientLastName}"
                                         class="entity-field-value"></div>
                                </div>

                                <div class="entity-field field-inline">
                                    <label class="entity-field-label">Appointment Reason</label>
                                    <div th:text="${appointmentDetails.appointmentReason.getDisplayValue()}"
                                         class="entity-field-value"></div>
                                </div>
                            </div>
                        </div>

                        <div th:unless="${#strings.trim(appointmentDetails.additionalNotes).isEmpty()}"
                             class="entity-section">

                            <div class="entity-fields">

                                <div class="entity-field">
                                    <label class="entity-field-label">Additional Notes</label>
                                    <textarea th:text="${appointmentDetails.additionalNotes}"
                                              class="entity-field-value entity-textarea" rows="2" readonly></textarea>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

                <!-- PRESCRIPTION -->
                <div class="view-card">

                    <div class="view-card-header">
                        <h3 class="view-card-title" style="text-align: center">Prescription</h3>

                        <div class="view-card-actions">
                            <form th:action="@{/appointments/{appointmentId}/prescription/create(appointmentId=${appointmentId})}" th:method="POST">
                                <button type="submit" class="btn-primary">
                                    <i class="fas fa-save"></i>
                                    Create Prescription
                                </button>
                            </form>
                        </div>
                    </div>


                    <!-- ADD MEDICAMENT ENTRY -->
                    <form th:action="@{/}" th:method="POST" class="entity-form">

                            <div class="view-card-actions">
                                <button  type="submit" class="btn-primary">
                                    <i class="fas fa-edit"></i>
                                    Add Medicament
                                </button>
                            </div>

                        <!-- MEDICAMENT PRESCRIPTION-->
                        <div class="entity-card-content">

                            <div class="entity-section">

                                <h3 class="entity-section-title">Medicament Details</h3>

                                <div class="entity-fields">

                                    <!-- MEDICAMENT TYPE -->
                                    <div class="entity-field">
                                        <label class="entity-field-label">Medicament Type <span
                                                class="required">*</span></label>
                                        <div class="form-group">
                                            <select>
                                                <option>Antibiotics</option>
                                                <option>Antispasmodics</option>
                                            </select>
                                            <!--<p th:if="${#fields.hasErrors('frequency')}" th:errors="*{frequency}" class="form-error"></p>-->
                                        </div>
                                    </div>

                                    <!-- MEDICAMENT NAME -->
                                    <div class="entity-field">
                                        <label class="entity-field-label">Medicament</label>
                                        <div class="form-group">
                                            <select>
                                                <option>Augmentin</option>
                                                <option>Zinat</option>
                                            </select>
                                            <!--<p th:if="${#fields.hasErrors('frequency')}" th:errors="*{frequency}" class="form-error"></p>-->
                                        </div>
                                    </div>

                                    <!-- FREQUENCY -->
                                    <div class="entity-field">
                                        <label class="entity-field-label">Dosage Form</label>
                                        <div class="form-group">
                                            <select id="dosage-form" name="dosageForm">
                                                <option>Select the dosage delivery form</option>
                                                <option>Oral</option>
                                                <option>Topical</option>
                                                <option>Inhalation</option>
                                                <option>Injection</option>
                                                <option>Suppositories</option>
                                                <option>Suppositories</option>
                                                <option>Other</option>
                                            </select>
                                            <!--<p th:if="${#fields.hasErrors('dosageForm')}" th:errors="*{dosageForm}" class="form-error"></p>-->
                                        </div>
                                    </div>

                                </div>
                            </div>

                            <div class="entity-section">

                                <h3 class="entity-section-title">Treatment Details</h3>

                                <div class="entity-fields">

                                    <!-- FREQUENCY -->
                                    <div class="entity-field">
                                        <label class="entity-field-label">Intake Frequency</label>
                                        <div class="form-group">
                                            <input id="frequency" name="frequency" placeholder="Specify the intake frequency">
                                            <!--<p th:if="${#fields.hasErrors('frequency')}" th:errors="*{frequency}" class="form-error"></p>-->
                                        </div>
                                    </div>

                                    <!-- DOSAGE -->
                                    <div class="entity-field">
                                        <label class="entity-field-label">Intake Dosage</label>
                                        <div class="form-group">
                                            <input id="dosage" name="dosage" placeholder="Specify the dosage i.e. 500mg">
                                            <!--<p th:if="${#fields.hasErrors('dosage')}" th:errors="*{dosage}" class="form-error"></p>-->
                                        </div>
                                    </div>

                                    <!-- TREATMENT DURATION -->
                                    <div class="entity-field">
                                        <label class="entity-field-label">Treatment Duration</label>
                                        <div class="form-group">
                                            <input id="treatment-duration" name="treatmentDuration" placeholder="Specify the duration for intake">
                                            <!--<p th:if="${#fields.hasErrors('treatmentDuration')}" th:errors="*{treatmentDuration}" class="form-error"></p>-->
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>

                        <!-- ADDITIONAL INSTRUCTIONS -->
                        <div class="entity-card-content">

                            <div class="entity-section">
                                <div class="entity-fields">

                                    <!-- ADDITIONAL INSTRUCTIONS -->
                                    <div class="entity-field">
                                        <label class="entity-field-label">Additional Instructions</label>
                                        <div class="form-group">
                                            <textarea id="additional-instructions" name="additionalInstructions"
                                                      placeholder="Outline any clinical findings i.e. laboratory tests and/or diagnostic imaging"
                                                      rows="2"></textarea>
                                            <!--<p th:if="${#fields.hasErrors('additionalInstructions')}" th:errors="*{additionalInstructions}" class="form-error"></p>-->
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
