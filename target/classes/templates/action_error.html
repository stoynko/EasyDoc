<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:replace="~{main_layout :: layout(~{::title},
                                    ~{::body[@data-fragment='body']},
                                    ~{::th:block[@data-fragment='head']},
                                    ~{::th:block[@data-fragment='scripts']}
      )}">

<head>
    <meta charset="UTF-8">
    <title data-fragment="title">EasyDoc</title>
    <th:block data-fragment="head">
        <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    </th:block>
</head>

<body data-fragment="body">

<!-- HEADER-->
<header sec:authorize="isAnonymous()" th:insert="~{fragments/components/header :: header}"></header>
<header sec:authorize="isAuthenticated()" th:insert="~{fragments/components/header :: header_auth}"></header>

<div class="workspace-container">

    <!-- SIDEBAR NAVIGATION -->
    <th:block sec:authorize="isAuthenticated() and !hasAuthority('STATUS_INCOMPLETE')">">
        <aside th:if="${#strings.contains(currentPath ?: '', '/settings')}"
               th:insert="~{fragments/components/sidebar_navigation :: settings_navigation}"
               class="sidebar">
        </aside>

        <aside th:if="${!#strings.contains(currentPath ?: '', '/settings') or #strings.contains(currentPath ?: '', '/onboarding')}"
               th:insert="~{fragments/components/sidebar_navigation :: workspace_navigation}"
               class="sidebar">
        </aside>
    </th:block>


    <!-- FRAGMENT DISPLAY -->
    <div class="main-content">
        <th:block th:switch="${errorMessage}">

            <th:block th:case="registrationFailed">
                <th:block th:insert="~{fragments/error_messages :: registration_failure}"></th:block>
            </th:block>

            <th:block th:case="emailVerificationFailed">
                <th:block th:insert="~{fragments/error_messages :: email_verification_failure}"></th:block>
            </th:block>

            <th:block th:case="onboardingAccountInfoSubmitFailure">
                <th:block th:insert="~{fragments/error_messages :: onboarding_account_info-submit_failure}"></th:block>
            </th:block>

            <th:block th:case="onboardingDoctorInfoSubmitFailure">
                <th:block th:insert="~{fragments/error_messages :: onboarding_doctor_info_submit_failure}"></th:block>
            </th:block>

            <th:block th:case="emailVerificationFailure">
                <th:block th:insert="~{fragments/error_messages :: email_verification_failure}"></th:block>
            </th:block>




        </th:block>
    </div>

</div>
</body>
</html>
