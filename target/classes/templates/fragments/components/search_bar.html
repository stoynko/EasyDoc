<th:block th:fragment="search_bar(action, placeholder)">

    <form class="search-filter" th:action="${action}" th:method="GET">
        <input id="query" name="query" type="search" class="search-bar-input"
               th:placeholder="${placeholder != null ? placeholder : 'Search by keyword'}">

        <!-- TODO: ADJUST IF WE WILL HONOR THE INITIALLY APPLIED FILTERING BY THE USER. IF SO ADJUST AND extraName, extraValue AND INPUT PARAM-->
        <!--<input type="hidden"
               th:if="${extraName != null and extraValue != null}"
               th:name="${extraName}"
               th:value="${extraValue}">-->

        <button type="submit" class="btn-primary search-btn">Search</button>
    </form>

</th:block>
