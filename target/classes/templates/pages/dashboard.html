<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:replace="~{pages/main_layout :: layout(~{::title},
                                    ~{::body[@data-fragment='body']},
                                    ~{::th:block[@data-fragment='head']},
                                    ~{::th:block[@data-fragment='scripts']}
      )}">

    <head>
        <meta charset="UTF-8">
        <title data-fragment="title">My Dashboard</title>
        <th:block data-fragment="head">
            <link rel="stylesheet" th:href="@{/css/dashboard.css}">
        </th:block>
    </head>

    <body data-fragment="body">

        <!-- HEADER-->
        <header th:insert="~{fragments/components/header :: header_auth}"></header>

        <div class="workspace-container">

            <!-- SIDEBAR NAVIGATION -->
            <aside th:insert="~{fragments/components/sidebar_navigation :: workspace_navigation}" class="sidebar"></aside>

            <!-- MAIN CONTENT-->
            <main class="main-content" th:switch="${role}">
                <th:block th:case="${T(com.github.stoynko.easydoc.models.enums.AccountRole).DOCTOR}"
                          th:insert="~{fragments/dashboard :: doctor_dashboard}"></th:block>

                <th:block th:case="${T(com.github.stoynko.easydoc.models.enums.AccountRole).PATIENT}"
                          th:insert="~{fragments/dashboard :: patient_dashboard}"></th:block>

                <th:block th:case="${T(com.github.stoynko.easydoc.models.enums.AccountRole).ADMIN}"
                          th:insert="~{fragments/dashboard :: admin_dashboard}"></th:block>

            </main>

        </div>
    </body>
</html>
